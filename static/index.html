<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoRia Scraper</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Unbounded:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0a0b; --surface:#111113; --border:#222226;
    --accent:#e8ff3c; --accent2:#3caaff;
    --text:#e8e8ec; --muted:#555562;
    --danger:#ff4444; --success:#3cffa0;
    --mono:'JetBrains Mono',monospace;
    --display:'Unbounded',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:13px;min-height:100vh}

  header{border-bottom:1px solid var(--border);padding:18px 28px;display:flex;align-items:center;gap:14px;position:sticky;top:0;background:var(--bg);z-index:100}
  .logo{font-family:var(--display);font-size:17px;font-weight:900;letter-spacing:-.5px}
  .logo span{color:var(--accent)}
  .badge{background:var(--border);color:var(--muted);font-size:10px;padding:2px 8px;border-radius:2px;letter-spacing:1px;text-transform:uppercase}

  .layout{display:grid;grid-template-columns:280px 1fr 260px;height:calc(100vh - 58px)}
  .panel{border-right:1px solid var(--border);overflow-y:auto;padding:18px}
  .panel:last-child{border-right:none;border-left:1px solid var(--border)}
  .panel-title{font-family:var(--display);font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border)}

  .field{margin-bottom:12px}
  label{display:block;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
  input,select{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:12px;padding:7px 9px;border-radius:3px;outline:none;transition:border-color .15s}
  input:focus,select:focus{border-color:var(--accent)}
  input::placeholder{color:var(--muted)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:7px}

  .btn{display:block;width:100%;padding:9px;font-family:var(--mono);font-size:12px;font-weight:700;border:none;border-radius:3px;cursor:pointer;transition:opacity .15s,transform .1s;margin-bottom:7px}
  .btn:hover{opacity:.85}.btn:active{transform:scale(.98)}
  .btn-primary{background:var(--accent);color:#000}
  .btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border)}
  .btn-small{display:inline-block;width:auto;padding:3px 9px;font-size:10px;margin:0}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  hr{border:none;border-top:1px solid var(--border);margin:14px 0}

  .main{padding:18px 22px;overflow-y:auto}
  .tabs{display:flex;margin-bottom:18px;border-bottom:1px solid var(--border)}
  .tab{padding:7px 16px;font-family:var(--mono);font-size:11px;cursor:pointer;border:none;background:none;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent)}

  .result-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:11px}
  .car-card{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:13px;cursor:pointer;animation:cardIn .25s ease both;transition:border-color .15s}
  .car-card:hover{border-color:var(--accent)}
  @keyframes cardIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
  .car-id{font-size:10px;color:var(--muted);margin-bottom:5px}
  .car-title{font-family:var(--display);font-size:12px;font-weight:700;margin-bottom:7px;line-height:1.3}
  .car-price{color:var(--accent);font-weight:700;font-size:14px;margin-bottom:7px}
  .car-meta{display:flex;flex-wrap:wrap;gap:5px}
  .tag{background:var(--border);color:var(--muted);font-size:10px;padding:2px 6px;border-radius:2px}

  .json-box{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:14px;font-size:11px;line-height:1.7;overflow:auto;white-space:pre;max-height:calc(100vh - 160px)}

  /* terminal log */
  .terminal{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:12px;font-size:11px;line-height:1.9;height:260px;overflow-y:auto;margin-bottom:14px}
  .t-ok{color:var(--success)}.t-err{color:var(--danger)}.t-info{color:var(--accent2)}.t-dim{color:var(--muted)}

  .progress-bar{height:3px;background:var(--border);border-radius:2px;margin-bottom:14px;overflow:hidden}
  .progress-fill{height:100%;background:var(--accent);width:0%;transition:width .3s;border-radius:2px}

  .file-item{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);gap:7px}
  .file-name{font-size:11px;word-break:break-all;flex:1}
  .file-meta{color:var(--muted);font-size:10px;white-space:nowrap}

  .stat-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border)}
  .stat-val{color:var(--accent);font-weight:700}

  .empty{text-align:center;color:var(--muted);padding:50px 0;font-size:12px}
  .spinner{display:inline-block;width:11px;height:11px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:5px}
  @keyframes spin{to{transform:rotate(360deg)}}
  ::-webkit-scrollbar{width:4px;height:4px}
  ::-webkit-scrollbar-track{background:var(--bg)}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>
<header>
  <div class="logo">Auto<span>RIA</span> Scraper</div>
  <div class="badge">без API</div>
  <div id="statusBadge" style="margin-left:auto;font-size:11px;color:var(--muted)">● готовий</div>
</header>

<div class="layout">

  <!-- ══ LEFT ══ -->
  <div class="panel">
    <div class="panel-title">Фільтри пошуку</div>

    <div class="field">
      <label>Марка (slug)</label>
      <input id="brand" placeholder="toyota, bmw, volkswagen…">
    </div>
    <div class="field">
      <label>Модель (slug)</label>
      <input id="model" placeholder="camry, x5, passat…">
    </div>
    <div class="field">
      <label>Рік (від / до)</label>
      <div class="row2">
        <input id="yearFrom" type="number" placeholder="2010">
        <input id="yearTo"   type="number" placeholder="2025">
      </div>
    </div>
    <div class="field">
      <label>Ціна USD (від / до)</label>
      <div class="row2">
        <input id="priceFrom" type="number" placeholder="0">
        <input id="priceTo"   type="number" placeholder="30000">
      </div>
    </div>
    <div class="field">
      <label>Регіон (slug)</label>
      <input id="region" placeholder="kiev, lviv, odessa…">
    </div>

    <hr>
    <div class="panel-title">Налаштування</div>

    <div class="field">
      <label>Сторінок для парсингу</label>
      <input id="pages" type="number" value="1" min="1" max="20">
    </div>
    <div class="field">
      <label>Затримка між запитами (сек)</label>
      <div class="row2">
        <input id="delayMin" type="number" value="1.5" step="0.5" placeholder="мін">
        <input id="delayMax" type="number" value="4.0" step="0.5" placeholder="макс">
      </div>
    </div>

    <button class="btn btn-primary" id="btnScrape" onclick="startScrape()">▶ Запустити парсинг</button>
    <button class="btn btn-secondary" onclick="stopScrape()">■ Зупинити</button>
  </div>

  <!-- ══ CENTER ══ -->
  <div class="main">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('cards',this)">Картки</button>
      <button class="tab" onclick="switchTab('json',this)">JSON</button>
    </div>

    <div id="tabCards">
      <div class="result-grid" id="resultGrid">
        <div class="empty" style="grid-column:1/-1">Налаштуй фільтри і натисни «Запустити парсинг»</div>
      </div>
    </div>
    <div id="tabJson" style="display:none">
      <pre class="json-box" id="jsonBox">// оберіть картку щоб побачити JSON</pre>
    </div>
  </div>

  <!-- ══ RIGHT ══ -->
  <div class="panel">
    <div class="panel-title">Статистика</div>
    <div class="stat-row"><span>Знайдено карток</span><span class="stat-val" id="sCards">0</span></div>
    <div class="stat-row"><span>JSON файлів</span><span class="stat-val" id="sFiles">—</span></div>
    <div class="stat-row"><span>Поточний файл</span><span class="stat-val" id="sFile" style="font-size:10px">—</span></div>

    <div class="panel-title" style="margin-top:18px">Термінал</div>
    <div class="terminal" id="terminal">
      <span class="t-dim">// тут з'явиться прогрес парсингу</span>
    </div>

    <div class="panel-title">Збережені файли</div>
    <div id="fileList"><div class="empty" style="padding:16px 0">Немає файлів</div></div>
    <button class="btn btn-secondary" style="margin-top:10px;font-size:11px" onclick="loadFiles()">↻ Оновити</button>
  </div>
</div>

<script>
let evtSource = null;
let cardCount = 0;
let lastJson = null;

// ── tabs ──
function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tabCards').style.display = name==='cards' ? '' : 'none';
  document.getElementById('tabJson').style.display  = name==='json'  ? '' : 'none';
}

// ── terminal ──
function tlog(msg) {
  const el = document.getElementById('terminal');
  const line = document.createElement('div');
  let cls = 't-dim';
  if (msg.includes('✅') || msg.includes('💾')) cls = 't-ok';
  else if (msg.includes('❌')) cls = 't-err';
  else if (msg.includes('📄') || msg.includes('🚗') || msg.includes('🔗')) cls = 't-info';
  line.className = cls;
  line.textContent = msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

function setStatus(txt, color='var(--muted)') {
  const el = document.getElementById('statusBadge');
  el.textContent = '● ' + txt;
  el.style.color = color;
}

// ── start ──
function startScrape() {
  if (evtSource) evtSource.close();

  const params = new URLSearchParams({
    pages:     document.getElementById('pages').value,
    brand:     document.getElementById('brand').value.trim(),
    model:     document.getElementById('model').value.trim(),
    region:    document.getElementById('region').value.trim(),
    delay_min: document.getElementById('delayMin').value,
    delay_max: document.getElementById('delayMax').value,
  });
  const yf = document.getElementById('yearFrom').value;
  const yt = document.getElementById('yearTo').value;
  const pf = document.getElementById('priceFrom').value;
  const pt = document.getElementById('priceTo').value;
  if (yf) params.append('year_from', yf);
  if (yt) params.append('year_to',   yt);
  if (pf) params.append('price_from', pf);
  if (pt) params.append('price_to',   pt);

  // reset UI
  cardCount = 0;
  document.getElementById('resultGrid').innerHTML = '<div class="empty" style="grid-column:1/-1"><span class="spinner"></span>Парсинг…</div>';
  document.getElementById('terminal').innerHTML = '';
  document.getElementById('sCards').textContent = '0';
  document.getElementById('progressFill').style.width = '0%';
  setStatus('парсинг…', 'var(--accent)');
  document.getElementById('btnScrape').disabled = true;

  evtSource = new EventSource(`/api/scrape?${params}`);

  evtSource.onmessage = (e) => {
    const msg = e.data;
    tlog(msg);

    if (msg.startsWith('__DONE__')) {
      const parts = msg.split(':');
      const filename = parts[1];
      const count = parseInt(parts[2]) || 0;
      document.getElementById('sFile').textContent = filename;
      document.getElementById('progressFill').style.width = '100%';
      setStatus(`готово — ${count} авто`, 'var(--success)');
      document.getElementById('btnScrape').disabled = false;
      evtSource.close();
      loadFiles();
      if (count > 0) loadPreview(filename);
      return;
    }

    // витягаємо інфо про авто з лог-рядків
    if (msg.includes('✅') && msg.includes('—')) {
      cardCount++;
      document.getElementById('sCards').textContent = cardCount;
      // анімуємо прогрес
      const pages = parseInt(document.getElementById('pages').value) || 1;
      const approx = pages * 20; // ~20 авто/сторінка
      document.getElementById('progressFill').style.width =
        Math.min(95, Math.round(cardCount / approx * 100)) + '%';
    }
  };

  evtSource.onerror = () => {
    setStatus('помилка з\'єднання', 'var(--danger)');
    document.getElementById('btnScrape').disabled = false;
    evtSource.close();
  };
}

function stopScrape() {
  if (evtSource) { evtSource.close(); evtSource = null; }
  setStatus('зупинено', 'var(--muted)');
  document.getElementById('btnScrape').disabled = false;
}

// ── preview cards ──
async function loadPreview(filename) {
  try {
    const r = await fetch(`/api/preview/${filename}?limit=50`);
    const data = await r.json();
    renderCards(data.cars || []);
  } catch(e) {}
}

function renderCards(cars) {
  const grid = document.getElementById('resultGrid');
  if (!cars.length) {
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1">Нічого не знайдено</div>';
    return;
  }
  grid.innerHTML = '';
  cars.forEach((car, i) => {
    const card = document.createElement('div');
    card.className = 'car-card';
    card.style.animationDelay = `${i * 0.04}s`;
    const price = car.price_usd ? `$${Number(car.price_usd).toLocaleString('uk')}` : '—';
    const km = car.mileage_km ? `${Math.round(car.mileage_km/1000)} тис. км` : '';
    card.innerHTML = `
      <div class="car-id">#${car.id || '—'}</div>
      <div class="car-title">${car.title || 'Без назви'}</div>
      <div class="car-price">${price}</div>
      <div class="car-meta">
        ${car.year    ? `<span class="tag">${car.year}</span>` : ''}
        ${km          ? `<span class="tag">${km}</span>` : ''}
        ${car.fuel    ? `<span class="tag">${car.fuel}</span>` : ''}
        ${car.gearbox ? `<span class="tag">${car.gearbox}</span>` : ''}
        ${car.city    ? `<span class="tag">📍 ${car.city}</span>` : ''}
      </div>
      ${car.url ? `<div style="margin-top:9px"><a href="${car.url}" target="_blank" style="color:var(--accent2);font-size:11px;text-decoration:none">→ auto.ria</a></div>` : ''}
    `;
    card.onclick = () => {
      lastJson = car;
      document.getElementById('jsonBox').textContent = JSON.stringify(car, null, 2);
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      document.querySelectorAll('.tab')[1].classList.add('active');
      document.getElementById('tabCards').style.display = 'none';
      document.getElementById('tabJson').style.display  = '';
    };
    grid.appendChild(card);
  });
}

// ── files ──
async function loadFiles() {
  const r = await fetch('/api/saved-files');
  const files = await r.json();
  document.getElementById('sFiles').textContent = files.length;
  const el = document.getElementById('fileList');
  if (!files.length) { el.innerHTML = '<div class="empty" style="padding:14px 0">Немає файлів</div>'; return; }
  el.innerHTML = files.map(f => `
    <div class="file-item">
      <div>
        <div class="file-name" style="cursor:pointer;color:var(--accent2)" onclick="loadPreview('${f.name}')">${f.name}</div>
        <div class="file-meta">${f.created} · ${f.size_kb} KB</div>
      </div>
      <a href="/api/download/${f.name}" download>
        <button class="btn btn-secondary btn-small">↓</button>
      </a>
    </div>
  `).join('');
}

loadFiles();
</script>
</body>
</html>
