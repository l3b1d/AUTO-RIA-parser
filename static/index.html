<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoRia Parser</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Unbounded:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0b;
    --surface: #111113;
    --border: #222226;
    --accent: #e8ff3c;
    --accent2: #3caaff;
    --text: #e8e8ec;
    --muted: #555562;
    --danger: #ff4444;
    --success: #3cffa0;
    --mono: 'JetBrains Mono', monospace;
    --display: 'Unbounded', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Header ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }

  .logo {
    font-family: var(--display);
    font-size: 18px;
    font-weight: 900;
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--accent); }

  .badge {
    background: var(--border);
    color: var(--muted);
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 2px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ── Layout ── */
  .layout {
    display: grid;
    grid-template-columns: 300px 1fr 280px;
    height: calc(100vh - 61px);
  }

  .panel {
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 20px;
  }
  .panel:last-child { border-right: none; border-left: 1px solid var(--border); }

  .panel-title {
    font-family: var(--display);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  /* ── Form ── */
  .field { margin-bottom: 14px; }

  label {
    display: block;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 5px;
  }

  input, select {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 8px 10px;
    border-radius: 3px;
    outline: none;
    transition: border-color 0.15s;
  }

  input:focus, select:focus { border-color: var(--accent); }
  input::placeholder { color: var(--muted); }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  /* ── Buttons ── */
  .btn {
    display: block;
    width: 100%;
    padding: 10px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    text-align: center;
    margin-bottom: 8px;
  }
  .btn:hover { opacity: 0.85; }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
  .btn-small {
    display: inline-block;
    width: auto;
    padding: 4px 10px;
    font-size: 10px;
    margin: 0;
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 18px 0;
  }

  /* ── Main area ── */
  .main { padding: 20px 24px; overflow-y: auto; }

  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    padding: 8px 18px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.5px;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.15s;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── Results ── */
  .result-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }

  .car-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px;
    transition: border-color 0.15s;
    cursor: pointer;
    animation: cardIn 0.25s ease both;
  }
  .car-card:hover { border-color: var(--accent); }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .car-id {
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .car-title {
    font-family: var(--display);
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 8px;
    line-height: 1.3;
  }
  .car-price {
    color: var(--accent);
    font-weight: 700;
    font-size: 15px;
    margin-bottom: 8px;
  }
  .car-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .tag {
    background: var(--border);
    color: var(--muted);
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 2px;
  }

  /* ── JSON viewer ── */
  .json-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px;
    font-size: 11px;
    line-height: 1.7;
    overflow-x: auto;
    white-space: pre;
    max-height: 500px;
    overflow-y: auto;
  }

  /* ── Log / Status ── */
  .log {
    font-size: 11px;
    line-height: 1.8;
  }
  .log-entry {
    padding: 4px 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 8px;
    align-items: baseline;
  }
  .log-time { color: var(--muted); flex-shrink: 0; }
  .log-ok { color: var(--success); }
  .log-err { color: var(--danger); }
  .log-info { color: var(--accent2); }

  /* ── File list ── */
  .file-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    gap: 8px;
  }
  .file-name { font-size: 11px; word-break: break-all; flex: 1; }
  .file-meta { color: var(--muted); font-size: 10px; white-space: nowrap; }

  /* ── Batch input ── */
  textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    padding: 8px 10px;
    border-radius: 3px;
    outline: none;
    resize: vertical;
    min-height: 80px;
  }
  textarea:focus { border-color: var(--accent); }

  .stat-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
  }
  .stat-val { color: var(--accent); font-weight: 700; }

  .empty {
    text-align: center;
    color: var(--muted);
    padding: 60px 0;
    font-size: 12px;
  }

  .spinner {
    display: inline-block;
    width: 12px; height: 12px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="logo">Auto<span>RIA</span> Parser</div>
  <div class="badge">v1.0</div>
  <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
    <div id="apiStatus" style="font-size:11px;color:var(--muted)">● API ключ не вказано</div>
  </div>
</header>

<div class="layout">

  <!-- ══ LEFT: Controls ══ -->
  <div class="panel">
    <div class="panel-title">Налаштування</div>

    <div class="field">
      <label>API Ключ *</label>
      <input type="password" id="apiKey" placeholder="Ваш ключ з developers.ria.com"
             oninput="updateApiStatus()">
    </div>

    <hr class="divider">
    <div style="font-size:10px;color:var(--muted);margin-bottom:14px;letter-spacing:1px;text-transform:uppercase">Пошук оголошень</div>

    <div class="field">
      <label>Марка</label>
      <select id="brandId" onchange="loadModels()">
        <option value="">— будь-яка —</option>
      </select>
    </div>

    <div class="field">
      <label>Модель</label>
      <select id="modelId">
        <option value="">— будь-яка —</option>
      </select>
    </div>

    <div class="field">
      <label>Рік (від / до)</label>
      <div class="row2">
        <input type="number" id="yearFrom" placeholder="2010" min="1990" max="2025">
        <input type="number" id="yearTo" placeholder="2025" min="1990" max="2025">
      </div>
    </div>

    <div class="field">
      <label>Ціна USD (від / до)</label>
      <div class="row2">
        <input type="number" id="priceFrom" placeholder="0">
        <input type="number" id="priceTo" placeholder="50000">
      </div>
    </div>

    <div class="field">
      <label>Кількість результатів</label>
      <input type="number" id="count" value="10" min="1" max="100">
    </div>

    <button class="btn btn-primary" onclick="searchCars()">🔍 Пошук</button>

    <hr class="divider">
    <div style="font-size:10px;color:var(--muted);margin-bottom:14px;letter-spacing:1px;text-transform:uppercase">Масовий збір деталей</div>

    <div class="field">
      <label>ID оголошень (через кому)</label>
      <textarea id="batchIds" placeholder="12345, 67890, 11111"></textarea>
    </div>
    <button class="btn btn-secondary" onclick="parseBatch()">⚡ Парсити деталі</button>
  </div>

  <!-- ══ CENTER: Results ══ -->
  <div class="main">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('cards', this)">Картки</button>
      <button class="tab" onclick="switchTab('json', this)">JSON</button>
    </div>

    <div id="tabCards">
      <div class="result-grid" id="resultGrid">
        <div class="empty" style="grid-column:1/-1">
          Введіть API ключ та натисніть «Пошук»
        </div>
      </div>
    </div>

    <div id="tabJson" style="display:none">
      <pre class="json-box" id="jsonBox">// тут буде JSON відповідь</pre>
    </div>
  </div>

  <!-- ══ RIGHT: Log + Files ══ -->
  <div class="panel">
    <div class="panel-title">Статистика</div>
    <div id="stats">
      <div class="stat-row"><span>Всього знайдено</span><span class="stat-val" id="statTotal">—</span></div>
      <div class="stat-row"><span>Деталей завантажено</span><span class="stat-val" id="statLoaded">0</span></div>
      <div class="stat-row"><span>JSON файлів</span><span class="stat-val" id="statFiles">—</span></div>
    </div>

    <div class="panel-title" style="margin-top:20px">Лог</div>
    <div class="log" id="log"></div>

    <div class="panel-title" style="margin-top:20px">Збережені файли</div>
    <div id="fileList"><div class="empty" style="padding:20px 0">Немає файлів</div></div>
    <button class="btn btn-secondary" style="margin-top:12px" onclick="loadFiles()">↻ Оновити</button>
  </div>
</div>

<script>
let lastJson = null;
let loadedCount = 0;

// ── API Key ──
function getKey() { return document.getElementById('apiKey').value.trim(); }
function updateApiStatus() {
  const el = document.getElementById('apiStatus');
  el.textContent = getKey() ? '● API ключ введено' : '● API ключ не вказано';
  el.style.color = getKey() ? 'var(--success)' : 'var(--muted)';
  if (getKey()) loadBrands();
}

// ── Logging ──
function log(msg, type = 'info') {
  const el = document.getElementById('log');
  const d = new Date().toLocaleTimeString('uk-UA', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML = `<span class="log-time">${d}</span><span class="log-${type}">${msg}</span>`;
  el.prepend(entry);
  if (el.children.length > 50) el.lastChild.remove();
}

// ── Tabs ──
function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tabCards').style.display = name === 'cards' ? '' : 'none';
  document.getElementById('tabJson').style.display  = name === 'json'  ? '' : 'none';
  if (name === 'json' && lastJson) {
    document.getElementById('jsonBox').textContent = JSON.stringify(lastJson, null, 2);
  }
}

// ── Load brands ──
async function loadBrands() {
  const key = getKey(); if (!key) return;
  try {
    const r = await fetch(`/api/brands?api_key=${encodeURIComponent(key)}&category_id=1`);
    const data = await r.json();
    const sel = document.getElementById('brandId');
    sel.innerHTML = '<option value="">— будь-яка —</option>';
    (data || []).forEach(b => {
      sel.innerHTML += `<option value="${b.value}">${b.name}</option>`;
    });
    log(`Завантажено ${(data||[]).length} марок`, 'ok');
  } catch(e) { log('Помилка завантаження марок', 'err'); }
}

// ── Load models ──
async function loadModels() {
  const key = getKey(); if (!key) return;
  const brandId = document.getElementById('brandId').value;
  const sel = document.getElementById('modelId');
  sel.innerHTML = '<option value="">— будь-яка —</option>';
  if (!brandId) return;
  try {
    const r = await fetch(`/api/models?api_key=${encodeURIComponent(key)}&category_id=1&brand_id=${brandId}`);
    const data = await r.json();
    (data || []).forEach(m => {
      sel.innerHTML += `<option value="${m.value}">${m.name}</option>`;
    });
  } catch(e) {}
}

// ── Search ──
async function searchCars() {
  const key = getKey();
  if (!key) { alert('Введіть API ключ'); return; }

  const grid = document.getElementById('resultGrid');
  grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px 0;color:var(--muted)"><span class="spinner"></span>Пошук…</div>';
  log('Запит пошуку…', 'info');

  const params = new URLSearchParams({ api_key: key, count: document.getElementById('count').value });
  const brand = document.getElementById('brandId').value;
  const model = document.getElementById('modelId').value;
  const yf = document.getElementById('yearFrom').value;
  const yt = document.getElementById('yearTo').value;
  const pf = document.getElementById('priceFrom').value;
  const pt = document.getElementById('priceTo').value;
  if (brand) params.append('brand_id', brand);
  if (model) params.append('model_id', model);
  if (yf) params.append('year_from', yf);
  if (yt) params.append('year_to', yt);
  if (pf) params.append('price_from', pf);
  if (pt) params.append('price_to', pt);

  try {
    const r = await fetch(`/api/search?${params}`);
    const data = await r.json();
    lastJson = data;

    const ids = data.ids || [];
    document.getElementById('statTotal').textContent = data.total || 0;
    log(`Знайдено ${data.total} оголошень, отримано ${ids.length} ID → ${data.saved_as}`, 'ok');

    if (!ids.length) {
      grid.innerHTML = '<div class="empty" style="grid-column:1/-1">Нічого не знайдено</div>';
      return;
    }

    // load details for each
    grid.innerHTML = '';
    loadedCount = 0;
    document.getElementById('statLoaded').textContent = '0';

    for (const id of ids) {
      fetchCarCard(id, key, grid);
    }
    loadFiles();
  } catch(e) {
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1;color:var(--danger)">Помилка запиту</div>';
    log(`Помилка: ${e.message}`, 'err');
  }
}

async function fetchCarCard(id, key, grid) {
  try {
    const r = await fetch(`/api/car/${id}?api_key=${encodeURIComponent(key)}`);
    const car = await r.json();
    loadedCount++;
    document.getElementById('statLoaded').textContent = loadedCount;

    const card = document.createElement('div');
    card.className = 'car-card';
    card.style.animationDelay = `${(loadedCount-1)*0.04}s`;

    const price = car.USD ? `$${Number(car.USD).toLocaleString('uk')}` : '—';
    const title = [car.markName, car.modelName, car.year].filter(Boolean).join(' ') || `ID ${id}`;
    const mileage = car.raceInt ? `${car.raceInt} тис. км` : '';
    const fuel = car.fuelName || '';
    const city = car.cityName || '';
    const gear = car.gearBoxName || '';

    card.innerHTML = `
      <div class="car-id">#${id}</div>
      <div class="car-title">${title}</div>
      <div class="car-price">${price}</div>
      <div class="car-meta">
        ${mileage ? `<span class="tag">${mileage}</span>` : ''}
        ${fuel ? `<span class="tag">${fuel}</span>` : ''}
        ${gear ? `<span class="tag">${gear}</span>` : ''}
        ${city ? `<span class="tag">📍 ${city}</span>` : ''}
      </div>
      ${car.linkToView ? `<div style="margin-top:10px"><a href="${car.linkToView}" target="_blank" style="color:var(--accent2);font-size:11px;text-decoration:none">→ відкрити на auto.ria</a></div>` : ''}
    `;
    card.onclick = () => showCarJson(car);
    grid.appendChild(card);
  } catch(e) {
    log(`ID ${id}: помилка завантаження`, 'err');
  }
}

function showCarJson(car) {
  lastJson = car;
  document.getElementById('jsonBox').textContent = JSON.stringify(car, null, 2);
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab')[1].classList.add('active');
  document.getElementById('tabCards').style.display = 'none';
  document.getElementById('tabJson').style.display = '';
}

// ── Batch parse ──
async function parseBatch() {
  const key = getKey();
  if (!key) { alert('Введіть API ключ'); return; }
  const ids = document.getElementById('batchIds').value.trim();
  if (!ids) { alert('Введіть ID'); return; }
  log(`Масовий парсинг: ${ids.split(',').length} ID…`, 'info');
  try {
    const r = await fetch(`/api/parse-batch?api_key=${encodeURIComponent(key)}&car_ids=${encodeURIComponent(ids)}`);
    const data = await r.json();
    log(`Готово: ${data.success} ок, ${data.failed} помилок → ${data.saved_as}`, data.failed ? 'err' : 'ok');
    loadFiles();
  } catch(e) {
    log(`Помилка batch: ${e.message}`, 'err');
  }
}

// ── Files ──
async function loadFiles() {
  try {
    const r = await fetch('/api/saved-files');
    const files = await r.json();
    const el = document.getElementById('fileList');
    document.getElementById('statFiles').textContent = files.length;
    if (!files.length) {
      el.innerHTML = '<div class="empty" style="padding:20px 0">Немає файлів</div>';
      return;
    }
    el.innerHTML = files.map(f => `
      <div class="file-item">
        <div>
          <div class="file-name">${f.name}</div>
          <div class="file-meta">${f.created} · ${f.size_kb} KB</div>
        </div>
        <a href="/api/download/${f.name}" download>
          <button class="btn btn-secondary btn-small">↓</button>
        </a>
      </div>
    `).join('');
  } catch(e) {}
}

// ── Init ──
loadFiles();
</script>
</body>
</html>
